name: NPM Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: tycode-linux-x86_64.tar.gz
          - os: macos-latest
            artifact: tycode-macos-x86_64.tar.gz
          - os: windows-latest
            artifact: tycode-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p releases
          tar -czf "releases/${{ matrix.artifact }}" -C "target/release" tycode

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p releases
          cd "target/release"
          powershell -Command "Compress-Archive -Path tycode.exe -DestinationPath ..\\..\\releases\${{ matrix.artifact }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: releases/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifacts
        run: |
          mkdir -p releases
          find artifacts -type f -exec mv {} releases/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: releases/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup npm authentication
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "@eronic-company:registry=https://registry.npmjs.org" >> ~/.npmrc
          chmod 600 ~/.npmrc

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
